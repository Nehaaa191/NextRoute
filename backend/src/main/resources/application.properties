# --- Server ---
server.port=${PORT:8080}
server.servlet.context-path=/nextroute
server.forward-headers-strategy=framework

# --- MySQL ---
# Railway provides MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# We construct the JDBC URL from individual vars to avoid mysql:// vs jdbc:mysql:// mismatch
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:nextroute_db}?useSSL=${MYSQL_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:2008}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET:NextRoute_Super_Secret_Key_Change_This_In_Production_2026}
jwt.expiration=86400000

# --- Admin ---
admin.email=${ADMIN_EMAIL:admin@nextroute.com}
admin.password=${ADMIN_PASSWORD:admin123}
admin.name=Admin

# --- CORS ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- File uploads ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# --- Twilio WhatsApp Config ---
twilio.account_sid=${TWILIO_ACCOUNT_SID:YOUR_ACCOUNT_SID}
twilio.auth_token=${TWILIO_AUTH_TOKEN:YOUR_AUTH_TOKEN}
twilio.whatsapp_number=${TWILIO_WHATSAPP_NUMBER:whatsapp:+14155238886}

# --- Firebase Config ---
firebase.service-account-file=${FIREBASE_SERVICE_ACCOUNT:classpath:firebase-service-account.json}
app.max-devices=${MAX_DEVICES:3}
